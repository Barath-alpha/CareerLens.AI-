<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_description %}CareerLens-AI – AI-powered campus placement prediction and career readiness platform for students.{% endblock %}">
  <title>{% block title %}CareerLens-AI{% endblock %} | AI-Powered Placement Platform</title>

  <!-- Preconnect Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block extra_css %}{% endblock %}

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>

<!-- Noise Overlay -->
<div class="noise-overlay"></div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

{% block body %}{% endblock %}

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  {% for category, message in messages %}
  showToast("{{ message|e }}", "{{ category }}");
  {% endfor %}
});
</script>
{% endif %}
{% endwith %}

<!-- Global JS -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}

<script>
// Initialize Lucide icons
lucide.createIcons();

// Theme initialization
const savedTheme = localStorage.getItem('placementai-theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
</script>
</body>
</html>
